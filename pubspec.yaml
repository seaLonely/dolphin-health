name: dolphin_health
description: 海豚健康管家 - 个人健康管理APP

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 数据库
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # 状态管理
  provider: ^6.1.1
  
  # 图表
  fl_chart: ^0.66.0
  
  # 日期格式化
  intl: ^0.19.0
  
  # 图标
  cupertino_icons: ^1.0.2
  
  # 分享功能
  share_plus: ^7.2.1
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
